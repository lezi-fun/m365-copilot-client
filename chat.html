<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M365 Copilot Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1a2e; --surface: #16213e; --border: #2a2a4a;
  --text: #e0e0e0; --text-dim: #888; --accent: #4f8cff;
  --user-bg: #2d3a6e; --bot-bg: #1e2a4a;
  --radius: 12px; --sidebar: 260px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex;
}
/* Sidebar */
.sidebar {
  width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 16px; flex-shrink: 0;
}
.sidebar h1 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.sidebar h1 span { color: var(--accent); }
.model-group { margin-bottom: 16px; }
.model-group label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: block; }
.model-group select {
  width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer;
}
.btn-new {
  width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--accent);
  background: transparent; color: var(--accent); cursor: pointer; font-size: 14px;
  margin-top: auto; transition: .2s;
}
.btn-new:hover { background: var(--accent); color: #fff; }
.status-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 6px; vertical-align: middle;
}
.status-dot.on { background: #4caf50; }
.status-dot.off { background: #f44336; }
.status-text { font-size: 12px; color: var(--text-dim); margin-top: 8px; text-align: center; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-header {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  font-size: 14px; color: var(--text-dim); display: flex; align-items: center; gap: 8px;
}
.messages {
  flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px;
}
.msg { max-width: 80%; padding: 12px 16px; border-radius: var(--radius); line-height: 1.6; font-size: 14px; }
.msg.user { background: var(--user-bg); align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.bot { background: var(--bot-bg); align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.system { background: transparent; align-self: center; font-size: 12px; color: var(--text-dim); }
.msg p { margin: 4px 0; }
.msg pre { background: #0d1117; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; font-size: 13px; }
.msg code { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
.msg p code { background: rgba(255,255,255,.1); padding: 2px 6px; border-radius: 4px; }
.msg ul, .msg ol { padding-left: 24px; margin: 4px 0; }
.msg-loading { display: flex; gap: 4px; padding: 4px 0; }
.msg-loading span {
  width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
  animation: bounce 1.4s ease-in-out infinite both;
}
.msg-loading span:nth-child(2) { animation-delay: .16s; }
.msg-loading span:nth-child(3) { animation-delay: .32s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* Input */
.input-area {
  padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-end;
}
.input-area textarea {
  flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 14px; resize: none;
  min-height: 48px; max-height: 150px; outline: none; font-family: inherit; line-height: 1.5;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area button {
  width: 48px; height: 48px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: .2s;
}
.input-area button:hover { opacity: .85; }
.input-area button:disabled { opacity: .4; cursor: not-allowed; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .msg { max-width: 90%; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h1>🤖 <span>M365</span> Copilot</h1>
  <div class="model-group">
    <label>模型</label>
    <select id="model-select">
      <option value="auto">自动 (Auto)</option>
      <option value="claude-sonnet" selected>Claude Sonnet</option>
      <option value="claude-opus">Claude Opus</option>
      <option value="gpt-5.5">GPT-5.5</option>
      <option value="gpt-5.5-think-deeper">GPT-5.5 Reasoning</option>
      <option value="gpt-5.4">GPT-5.4</option>
      <option value="gpt-5.3">GPT-5.3</option>
      <option value="gpt-5.2">GPT-5.2</option>
      <option value="think-deeper">深度思考</option>
      <option value="quick">快速模式</option>
    </select>
  </div>
  <div class="model-group">
    <label>API 地址</label>
    <input type="text" id="api-url" value="http://127.0.0.1:23100/v1"
           style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;">
  </div>
  <div style="margin-top:12px;font-size:12px;color:var(--text-dim);">
    <span class="status-dot on" id="status-dot"></span>
    <span id="status-text">已连接</span>
  </div>
  <button class="btn-new" onclick="newChat()">+ 新对话</button>
</div>

<!-- Main -->
<div class="main">
  <div class="chat-header">
    <span id="conv-id-display">新对话</span>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"
              onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="send()">➤</button>
  </div>
</div>

<script>
const API_URL = () => document.getElementById('api-url').value.trim() || 'http://127.0.0.1:23100/v1';
const MODEL = () => document.getElementById('model-select').value;
let messages = [];
let loading = false;
let controller = null;

marked.setOptions({
  breaks: true,
  gfm: true,
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch {}
    }
    return code;
  }
});

// Init
addMsg('system', '连接 M365 Copilot API...');
fetch(API_URL() + '/models')
  .then(r => r.json())
  .then(d => {
    setStatus(true);
    if (d.data) {
      const sel = document.getElementById('model-select');
      d.data.forEach(m => {
        if (![...sel.options].some(o => o.value === m.id)) {
          const opt = document.createElement('option');
          opt.value = m.id; opt.textContent = m.id;
          sel.appendChild(opt);
        }
      });
    }
  })
  .catch(() => {
    setStatus(false);
    addMsg('system', '⚠️ 无法连接 API 服务器，请确认 api.py 已启动');
  });

function setStatus(ok) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + (ok ? 'on' : 'off');
  txt.textContent = ok ? '已连接' : '未连接';
}

function addMsg(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'system') {
    div.textContent = content;
  } else {
    div.innerHTML = marked.parse(content);
  }
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="msg-loading"><span></span><span></span><span></span></div>';
  div.id = 'loading-indicator';
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function removeLoading() {
  const el = document.getElementById('loading-indicator');
  if (el) el.remove();
}

function updateMsg(el, content) {
  el.innerHTML = marked.parse(content);
  el.scrollIntoView({ behavior: 'smooth' });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

async function send() {
  const input = document.getElementById('input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text || loading) return;

  input.value = '';
  input.style.height = 'auto';
  messages.push({ role: 'user', content: text });
  addMsg('user', text);

  loading = true;
  btn.disabled = true;
  addLoading();

  const botEl = document.createElement('div');
  botEl.className = 'msg bot';
  document.getElementById('messages').appendChild(botEl);

  let reply = '';
  controller = new AbortController();

  try {
    const resp = await fetch(API_URL() + '/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL(),
        messages: messages.map(m => ({ role: m.role, content: m.content })),
        stream: true,
      }),
      signal: controller.signal,
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const chunk = JSON.parse(data);
            const content = chunk.choices?.[0]?.delta?.content || '';
            if (content) {
              reply += content;
              removeLoading();
              updateMsg(botEl, reply);
            }
          } catch {}
        }
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      removeLoading();
      botEl.textContent = '❌ ' + err.message;
    }
  }

  if (reply) {
    messages.push({ role: 'assistant', content: reply });
  }
  removeLoading();
  loading = false;
  btn.disabled = false;
  controller = null;
}

function newChat() {
  if (loading && controller) {
    controller.abort();
    controller = null;
    loading = false;
    document.getElementById('send-btn').disabled = false;
    removeLoading();
  }
  messages = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('conv-id-display').textContent = '新对话';
}
</script>
</body>
</html>
